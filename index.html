<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CxO エージェント｜表現3パターン 比較</title>
<style>
  :root{ --wine:#862040; --gold:#c9a333; --ink:#1a1b1f; --line:#e7e2dc; --bg:#f4f1ec; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; }
  .bar{ position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:12px clamp(14px,2vw,24px); background:#fff; border-bottom:1px solid var(--line); }
  .bar h1{ font-size:15px; margin:0; letter-spacing:.02em; }
  .bar .sub{ font-size:12px; color:#7a746c; }
  .bar label{ font-size:12.5px; color:#4a4742; display:inline-flex; align-items:center; gap:6px; cursor:pointer; margin-left:auto; }
  .grid{ display:flex; gap:14px; padding:14px clamp(10px,1.4vw,18px); align-items:flex-start;
    height:calc(100vh - 52px); overflow-x:auto; }
  .col{ flex:1 1 0; min-width:360px; display:flex; flex-direction:column; height:100%;
    background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden;
    box-shadow:0 18px 44px -34px rgba(34,0,0,.4); }
  .col__head{ display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line); }
  .tag{ font-size:11px; font-weight:700; letter-spacing:.04em; color:#fff; background:var(--wine);
    border-radius:999px; padding:3px 10px; }
  .tag--b{ background:#6b6f76; } .tag--c{ background:var(--gold); color:#3a2c00; }
  .col__name{ font-size:13.5px; font-weight:700; }
  .col__desc{ font-size:11.5px; color:#8a847b; }
  .col__open{ margin-left:auto; font-size:11.5px; color:var(--wine); text-decoration:none; border:1px solid var(--line);
    border-radius:999px; padding:4px 11px; white-space:nowrap; }
  .col__open:hover{ background:#fbeff2; }
  .col__frame{ flex:1 1 auto; border:0; width:100%; background:#fff; }
</style>
</head>
<body>
  <div class="bar">
    <h1>CxO エージェント — 表現3パターン比較</h1>
    <span class="sub">構成・レイアウトは共通／文章（トーン）だけ差し替え。各列は横スクロールでメンバー等も確認できます。</span>
    <label><input type="checkbox" id="sync" checked /> スクロールを同期</label>
  </div>
  <div class="grid">
    <div class="col">
      <div class="col__head">
        <span class="tag">A</span>
        <span class="col__name">仲間探し寄り</span>
        <span class="col__desc">＝現公開トーン</span>
        <a class="col__open" href="./A/" target="_blank" rel="noopener">全画面 ↗</a>
      </div>
      <iframe class="col__frame" src="./A/" title="仲間探し寄り"></iframe>
    </div>
    <div class="col">
      <div class="col__head">
        <span class="tag tag--b">B</span>
        <span class="col__name">折衷</span>
        <span class="col__desc">＝世界観＋実体明確化</span>
        <a class="col__open" href="./B/" target="_blank" rel="noopener">全画面 ↗</a>
      </div>
      <iframe class="col__frame" src="./B/" title="折衷"></iframe>
    </div>
    <div class="col">
      <div class="col__head">
        <span class="tag tag--c">C</span>
        <span class="col__name">エージェント寄り</span>
        <span class="col__desc">＝指摘前トーン</span>
        <a class="col__open" href="./C/" target="_blank" rel="noopener">全画面 ↗</a>
      </div>
      <iframe class="col__frame" src="./C/" title="エージェント寄り"></iframe>
    </div>
  </div>
  <script>
    const frames = [...document.querySelectorAll('.col__frame')];
    const sync = document.getElementById('sync');
    let lock = false;
    frames.forEach((f) => {
      f.addEventListener('load', () => {
        try {
          const w = f.contentWindow;
          w.addEventListener('scroll', () => {
            if (!sync.checked || lock) return;
            lock = true;
            const y = w.scrollY;
            frames.forEach((g) => { if (g !== f) { try { g.contentWindow.scrollTo(0, y); } catch (e) {} } });
            requestAnimationFrame(() => { lock = false; });
          }, { passive: true });
        } catch (e) {}
      });
    });
  </script>
</body>
</html>
